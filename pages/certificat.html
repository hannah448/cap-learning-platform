<!DOCTYPE html>
<html lang="fr">
<head>
        <!-- cap-learning:migrate-brand -->
    <script src="../js/migrate-brand.js"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificat Cap Learning</title>
    <meta name="description" content="Certificat officiel Cap Learning by Digi Atlas attestant la réussite d'une formation.">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #F1F5F9;
            color: #1F2937;
            min-height: 100vh;
            padding: 32px 16px;
        }

        .cert-toolbar {
            width: 100%;
            max-width: 1050px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cert-toolbar h1 {
            font-size: 1rem;
            margin: 0;
            color: #475569;
            font-weight: 500;
        }
        .cert-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            background: #fff;
            color: #1F2937;
            font-family: inherit;
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s ease;
        }
        .cert-btn:hover {
            border-color: #6366F1;
            color: #4F46E5;
        }
        .cert-btn-primary {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: #fff;
            border-color: transparent;
        }
        .cert-btn-primary:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, .35);
        }

        /* ------- Certificat ------- */
        .cert-page {
            width: 100%;
            max-width: 1050px;
            margin: 0 auto;
            aspect-ratio: 1.414 / 1;           /* A4 landscape */
            background: #fff;
            padding: 22px;
            box-shadow: 0 25px 60px rgba(15, 23, 42, .15);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .cert-inner {
            width: 100%;
            height: 100%;
            border: 2px solid #D4A63F;
            padding: 56px 68px;
            position: relative;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 0% 0%, rgba(212, 166, 63, .06), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(79, 70, 229, .05), transparent 40%),
                #fff;
        }

        .cert-inner::before,
        .cert-inner::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #D4A63F;
            opacity: .35;
        }
        .cert-inner::before {
            top: 18px; left: 18px;
            border-right: none;
            border-bottom: none;
        }
        .cert-inner::after {
            bottom: 18px; right: 18px;
            border-left: none;
            border-top: none;
        }

        /* Bandeau haut : logos */
        .cert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .cert-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cert-logo-mark {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'Satoshi', sans-serif;
        }
        .cert-logo-text {
            font-family: 'Satoshi', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #1F2937;
            line-height: 1;
        }
        .cert-logo-accent { color: #4F46E5; }
        .cert-logo-tag {
            font-size: .7rem;
            color: #64748B;
            margin-top: 3px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        .cert-digi-atlas {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .cert-digi-atlas img {
            height: 54px;
            width: auto;
        }
        .cert-digi-atlas-label {
            font-size: .7rem;
            color: #64748B;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        /* Corps */
        .cert-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 14px;
        }

        .cert-eyebrow {
            font-size: .75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #D4A63F;
            font-weight: 700;
        }

        .cert-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 3rem;
            color: #1F2937;
            margin: 0;
            line-height: 1;
        }

        .cert-divider {
            width: 140px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4A63F, transparent);
            margin: 6px 0;
        }

        .cert-lead {
            font-size: .95rem;
            color: #475569;
            margin: 0;
        }

        .cert-learner {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 2.6rem;
            color: #4F46E5;
            margin: 6px 0 2px;
            line-height: 1.1;
        }

        .cert-course {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1F2937;
            max-width: 80%;
            line-height: 1.35;
            margin: 8px 0 0;
        }

        .cert-grade-block {
            display: flex;
            gap: 28px;
            align-items: center;
            justify-content: center;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .cert-grade-item {
            text-align: center;
        }
        .cert-grade-value {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 2rem;
            color: #D4A63F;
            line-height: 1;
        }
        .cert-grade-label {
            font-size: .7rem;
            color: #64748B;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Pied : signature + cachet + ID */
        .cert-footer {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 20px;
            margin-top: 24px;
        }

        .cert-sig {
            text-align: center;
        }
        .cert-sig-line {
            height: 1px;
            background: #1F2937;
            margin-bottom: 6px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .cert-sig-name {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #1F2937;
            margin-bottom: 3px;
        }
        .cert-sig-role {
            font-size: .72rem;
            color: #64748B;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        .cert-stamp {
            width: 110px;
            height: 110px;
            border: 2px solid #D4A63F;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #D4A63F;
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            padding: 12px;
            transform: rotate(-6deg);
            position: relative;
            background: rgba(255, 255, 255, .8);
        }
        .cert-stamp-inner {
            position: absolute;
            inset: 6px;
            border: 1px dashed #D4A63F;
            border-radius: 50%;
        }
        .cert-stamp-line {
            line-height: 1.25;
            position: relative;
            z-index: 1;
        }
        .cert-stamp-big {
            font-size: 1.3rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 2px;
            margin: 2px 0;
        }

        .cert-meta {
            text-align: center;
            font-size: .8rem;
            color: #64748B;
            line-height: 1.5;
        }
        .cert-meta strong { color: #1F2937; font-family: 'Satoshi', monospace; letter-spacing: .5px; }

        /* Etat erreur */
        .cert-error {
            max-width: 560px;
            background: #fff;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }
        .cert-error h2 { margin-top: 0; color: #B91C1C; }
        .cert-error a { color: #4F46E5; }

        /* Impression */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }
            body {
                background: #fff;
                padding: 0;
            }
            .cert-toolbar { display: none; }
            .cert-page {
                width: 100vw;
                height: 100vh;
                max-width: none;
                aspect-ratio: auto;
                box-shadow: none;
                border-radius: 0;
                padding: 14px;
            }
        }

        @media (max-width: 720px) {
            .cert-inner { padding: 28px 24px; }
            .cert-title { font-size: 2rem; }
            .cert-learner { font-size: 1.9rem; }
            .cert-course { font-size: 1rem; max-width: 100%; }
            .cert-footer { grid-template-columns: 1fr; gap: 28px; }
            .cert-stamp { margin: 0 auto; }
            .cert-inner::before, .cert-inner::after { display: none; }
        }
    </style>
</head>
<body>
    <script src="../js/admin-data.js"></script>

    <div class="cert-toolbar" id="toolbar">
        <h1>Certificat officiel Cap Learning</h1>
        <div>
            <a href="admin.html" class="cert-btn">&larr; Retour à l'admin</a>
            <button type="button" class="cert-btn cert-btn-primary" onclick="window.print()">
                &#128438; Imprimer / PDF
            </button>
        </div>
    </div>

    <div id="cert-root"></div>

    <script>
    (function () {
        const root = document.getElementById('cert-root');
        const params = new URLSearchParams(location.search);
        const enrollmentId = params.get('e');
        const D = window.AdminData;

        if (!D || !enrollmentId) {
            root.innerHTML = `
                <div class="cert-error">
                    <h2>Paramètre manquant</h2>
                    <p>Aucun identifiant d'inscription fourni. Utilisation : <code>certificat.html?e=&lt;enrollmentId&gt;</code></p>
                    <p><a href="admin.html">Retour au panneau d'administration</a></p>
                </div>`;
            return;
        }

        const enrollment = D.getEnrollmentById(enrollmentId);
        if (!enrollment) {
            root.innerHTML = `
                <div class="cert-error">
                    <h2>Certificat introuvable</h2>
                    <p>Aucune inscription ne correspond à l'identifiant <code>${enrollmentId}</code>.</p>
                    <p><a href="admin.html">Retour au panneau d'administration</a></p>
                </div>`;
            return;
        }
        if (!enrollment.certified) {
            root.innerHTML = `
                <div class="cert-error">
                    <h2>Certification non délivrée</h2>
                    <p>Cet apprenant n'est pas encore certifié pour cette formation. Retour à l'espace admin pour délivrer le certificat.</p>
                    <p><a href="admin.html">Retour au panneau d'administration</a></p>
                </div>`;
            return;
        }

        const user = D.getUser(enrollment.userId);
        const course = D.getCourse(enrollment.courseId);
        if (!user || !course) {
            root.innerHTML = `<div class="cert-error"><h2>Données manquantes</h2><p><a href="admin.html">Retour</a></p></div>`;
            return;
        }

        const dateFr = new Date(enrollment.certifiedAt).toLocaleDateString('fr-FR', {
            day: '2-digit', month: 'long', year: 'numeric'
        });
        const year = new Date(enrollment.certifiedAt).getFullYear();

        // Mention : note /20
        const grade = enrollment.grade;
        const mention = grade >= 16 ? 'Très bien'
                      : grade >= 14 ? 'Bien'
                      : grade >= 12 ? 'Assez bien'
                      : 'Passable';

        document.title = `Certificat — ${user.name} — ${course.name}`;

        root.innerHTML = `
            <article class="cert-page" role="document" aria-label="Certificat de réussite">
                <div class="cert-inner">
                    <header class="cert-header">
                        <div class="cert-logo">
                            <div class="cert-logo-mark">A</div>
                            <div>
                                <div class="cert-logo-text">Afri<span class="cert-logo-accent">Learn</span></div>
                                <div class="cert-logo-tag">E-learning premium</div>
                            </div>
                        </div>
                        <div class="cert-digi-atlas">
                            <img src="../img/digi-atlas-logo.jpg" alt="Digi Atlas">
                            <span class="cert-digi-atlas-label">Édité par Digi Atlas &middot; France</span>
                        </div>
                    </header>

                    <div class="cert-body">
                        <div class="cert-eyebrow">Certificat de réussite</div>
                        <h1 class="cert-title">Certificat d'accomplissement</h1>
                        <div class="cert-divider"></div>
                        <p class="cert-lead">Nous certifions par la présente que</p>
                        <div class="cert-learner">${escapeHtml(user.name)}</div>
                        <p class="cert-lead">a suivi et réussi avec succès la formation en ligne</p>
                        <div class="cert-course">« ${escapeHtml(course.name)} »</div>

                        <div class="cert-grade-block">
                            <div class="cert-grade-item">
                                <div class="cert-grade-value">${grade}/20</div>
                                <div class="cert-grade-label">Note finale</div>
                            </div>
                            <div class="cert-grade-item">
                                <div class="cert-grade-value">${escapeHtml(mention)}</div>
                                <div class="cert-grade-label">Mention</div>
                            </div>
                            <div class="cert-grade-item">
                                <div class="cert-grade-value">${course.duration} h</div>
                                <div class="cert-grade-label">Durée totale</div>
                            </div>
                        </div>
                    </div>

                    <footer class="cert-footer">
                        <div class="cert-sig">
                            <div class="cert-sig-name">Hannah Peters</div>
                            <div class="cert-sig-line"></div>
                            <div class="cert-sig-role">Directrice pédagogique &middot; Digi Atlas</div>
                        </div>

                        <div class="cert-stamp" aria-hidden="true">
                            <div class="cert-stamp-inner"></div>
                            <div class="cert-stamp-line">Cap Learning</div>
                            <div class="cert-stamp-line cert-stamp-big">${year}</div>
                            <div class="cert-stamp-line">Certifié</div>
                        </div>

                        <div class="cert-meta">
                            <div>Délivré le <strong>${escapeHtml(dateFr)}</strong></div>
                            <div>N° certificat : <strong>${escapeHtml(enrollment.certificateId)}</strong></div>
                            <div>Vérifiable sur caplearning.digi-atlas.com</div>
                        </div>
                    </footer>
                </div>
            </article>
        `;

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            })[c]);
        }
    })();
    </script>
</body>
</html>
