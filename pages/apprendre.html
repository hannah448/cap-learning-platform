<!DOCTYPE html>
<html lang="fr">
<head>
        <!-- cap-learning:migrate-brand -->
    <script src="../js/migrate-brand.js"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation - Cap Learning LMS</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/lms.css">
    <style>
        /* --- Learn Page Specific --- */
        .learn-layout { display: flex; min-height: 100vh; }

        /* Sidebar curriculum */
        .learn-sidebar {
            width: 340px;
            background: var(--color-secondary);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            overflow: hidden;
        }

        .learn-sidebar-header {
            padding: var(--space-5) var(--space-5);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .learn-sidebar-back {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-gray-400);
            font-size: var(--text-sm);
            text-decoration: none;
            margin-bottom: var(--space-3);
            transition: color 0.2s;
        }
        .learn-sidebar-back:hover { color: white; }

        .learn-sidebar-title {
            font-family: var(--font-display);
            font-size: var(--text-base);
            font-weight: 700;
            color: white;
            line-height: 1.3;
        }

        .learn-sidebar-progress {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-top: var(--space-3);
            font-size: var(--text-xs);
            color: var(--color-gray-400);
        }

        .learn-progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .learn-progress-fill {
            height: 100%;
            background: var(--color-primary);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        /* Module list */
        .learn-modules {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-3) 0;
        }

        .learn-module-group {
            margin-bottom: var(--space-2);
        }

        .learn-module-title {
            padding: var(--space-3) var(--space-5);
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--color-gray-400);
        }

        .learn-lesson {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-5);
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
            font-size: var(--text-sm);
            color: var(--color-gray-300);
        }

        .learn-lesson:hover { background: rgba(255,255,255,0.05); }

        .learn-lesson.active {
            background: rgba(58,80,246,0.15);
            border-left-color: var(--color-primary);
            color: white;
        }

        .learn-lesson.completed { color: var(--color-success); }
        .learn-lesson.completed .lesson-check { color: var(--color-success); }

        .lesson-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--color-gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .learn-lesson.completed .lesson-check {
            background: var(--color-success);
            border-color: var(--color-success);
            color: white;
        }

        .learn-lesson.active .lesson-check {
            border-color: var(--color-primary);
        }

        .lesson-label { flex: 1; line-height: 1.3; }

        .lesson-type {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            flex-shrink: 0;
        }
        .lesson-type-video { background: rgba(58,80,246,0.2); color: var(--color-primary-light); }
        .lesson-type-exercise { background: rgba(16,185,129,0.2); color: #34D399; }
        .lesson-type-quiz { background: rgba(245,158,11,0.2); color: #FCD34D; }

        .lesson-duration {
            font-size: var(--text-xs);
            color: var(--color-gray-500);
            flex-shrink: 0;
        }

        /* Main content */
        .learn-main {
            flex: 1;
            margin-left: 340px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--surface-secondary);
        }

        /* Video player area */
        .learn-player {
            background: #000;
            aspect-ratio: 16/9;
            max-height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .learn-player-placeholder {
            text-align: center;
            color: rgba(255,255,255,0.6);
        }

        .learn-player-placeholder .play-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto var(--space-3);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .learn-player-placeholder .play-icon:hover {
            background: var(--color-primary);
            color: white;
        }

        /* Content area below player */
        .learn-content {
            flex: 1;
            padding: var(--space-8);
            max-width: 860px;
        }

        .learn-content-header {
            margin-bottom: var(--space-6);
        }

        .learn-content-header h1 {
            font-size: var(--text-xl);
            margin-bottom: var(--space-2);
        }

        .learn-content-meta {
            display: flex;
            gap: var(--space-4);
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        .learn-content-body {
            font-size: var(--text-base);
            color: var(--text-secondary);
            line-height: var(--leading-relaxed);
            margin-bottom: var(--space-8);
        }

        .learn-content-body p { margin-bottom: var(--space-4); }
        .learn-content-body ul { margin: var(--space-3) 0; padding-left: var(--space-6); }
        .learn-content-body li { margin-bottom: var(--space-2); }

        /* Navigation buttons */
        .learn-nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-5) var(--space-8);
            border-top: 1px solid var(--color-gray-200);
            background: white;
        }

        .learn-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .learn-nav-prev {
            background: var(--color-gray-100);
            color: var(--text-secondary);
        }
        .learn-nav-prev:hover { background: var(--color-gray-200); }

        .learn-nav-next {
            background: var(--color-primary);
            color: white;
        }
        .learn-nav-next:hover { background: var(--color-primary-dark); }

        .learn-complete-btn {
            background: var(--color-success);
            color: white;
            border: none;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
        }
        .learn-complete-btn:hover { filter: brightness(1.1); }
        .learn-complete-btn.done { background: var(--color-gray-300); pointer-events: none; }

        /* --- Exercise Styles --- */
        .exercise-container {
            background: white;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .exercise-header {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-5);
        }

        .exercise-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .exercise-icon-practice { background: rgba(16,185,129,0.1); }
        .exercise-icon-quiz { background: rgba(245,158,11,0.1); }

        .exercise-title {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
        }
        .exercise-subtitle {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        /* Text exercise */
        .exercise-instructions {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: var(--leading-relaxed);
            margin-bottom: var(--space-5);
            padding: var(--space-4);
            background: var(--color-gray-50);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--color-success);
        }

        .exercise-textarea {
            width: 100%;
            min-height: 150px;
            padding: var(--space-4);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            line-height: var(--leading-relaxed);
            resize: vertical;
            transition: border-color 0.2s;
            outline: none;
        }
        .exercise-textarea:focus { border-color: var(--color-primary); }

        .exercise-submit-row {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-4);
        }

        /* Quiz styles */
        .quiz-question {
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-5);
            border-bottom: 1px solid var(--color-gray-100);
        }
        .quiz-question:last-of-type { border-bottom: none; }

        .quiz-question-text {
            font-weight: 600;
            font-size: var(--text-base);
            margin-bottom: var(--space-4);
            display: flex;
            gap: var(--space-2);
        }

        .quiz-question-number {
            color: var(--color-primary);
            font-family: var(--font-display);
            font-weight: 700;
            flex-shrink: 0;
        }

        .quiz-options { display: flex; flex-direction: column; gap: var(--space-2); }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s;
            font-size: var(--text-sm);
        }

        .quiz-option:hover { border-color: var(--color-primary-light); background: var(--color-primary-50); }
        .quiz-option.selected { border-color: var(--color-primary); background: var(--color-primary-50); }
        .quiz-option.correct { border-color: var(--color-success); background: #ECFDF5; }
        .quiz-option.wrong { border-color: var(--color-error); background: #FEF2F2; }

        .quiz-option-radio {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid var(--color-gray-300);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .quiz-option.selected .quiz-option-radio { border-color: var(--color-primary); background: var(--color-primary); }
        .quiz-option.selected .quiz-option-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; }
        .quiz-option.correct .quiz-option-radio { border-color: var(--color-success); background: var(--color-success); }
        .quiz-option.correct .quiz-option-radio::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
        .quiz-option.wrong .quiz-option-radio { border-color: var(--color-error); background: var(--color-error); }
        .quiz-option.wrong .quiz-option-radio::after { content: '✕'; color: white; font-size: 12px; font-weight: 700; }

        .quiz-explanation {
            margin-top: var(--space-3);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            display: none;
        }
        .quiz-explanation.show { display: block; }
        .quiz-explanation.correct { background: #ECFDF5; color: #065F46; }
        .quiz-explanation.wrong { background: #FEF2F2; color: #991B1B; }

        .quiz-results {
            background: white;
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            text-align: center;
            display: none;
        }
        .quiz-results.show { display: block; }

        .quiz-score {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: var(--space-2);
        }
        .quiz-score.excellent { color: var(--color-success); }
        .quiz-score.average { color: var(--color-warning); }
        .quiz-score.poor { color: var(--color-error); }

        .quiz-results-text {
            font-size: var(--text-lg);
            color: var(--text-secondary);
            margin-bottom: var(--space-5);
        }

        /* --- Auto-corrected Exercises --- */

        /* Fill-in-the-blank */
        .fill-blank-sentence {
            font-size: var(--text-base);
            line-height: 2.2;
            color: var(--text-primary);
            margin-bottom: var(--space-4);
        }

        .fill-blank-input {
            display: inline-block;
            width: 180px;
            padding: var(--space-1) var(--space-3);
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            text-align: center;
            outline: none;
            transition: all 0.25s;
            background: var(--color-gray-50);
            margin: 0 4px;
        }
        .fill-blank-input:focus { border-color: var(--color-primary); background: white; }
        .fill-blank-input.correct { border-color: var(--color-success); background: #ECFDF5; color: #065F46; }
        .fill-blank-input.wrong { border-color: var(--color-error); background: #FEF2F2; color: #991B1B; }

        .fill-blank-correction {
            display: none;
            font-size: var(--text-xs);
            color: var(--color-success);
            font-weight: 600;
            margin-left: 4px;
        }
        .fill-blank-correction.show { display: inline; }

        /* True/False */
        .tf-question {
            display: flex;
            align-items: flex-start;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
            margin-bottom: var(--space-3);
            background: white;
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-xl);
            transition: border-color 0.2s;
        }
        .tf-question.answered-correct { border-color: var(--color-success); background: #F0FDF9; }
        .tf-question.answered-wrong { border-color: var(--color-error); background: #FEF8F8; }

        .tf-statement {
            flex: 1;
            font-size: var(--text-sm);
            line-height: var(--leading-relaxed);
            color: var(--text-primary);
        }

        .tf-buttons {
            display: flex;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .tf-btn {
            padding: var(--space-2) var(--space-3);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            font-weight: 700;
            cursor: pointer;
            background: white;
            font-family: var(--font-body);
            transition: all 0.2s;
            min-width: 50px;
            text-align: center;
        }
        .tf-btn:hover { border-color: var(--color-primary-light); }
        .tf-btn.selected { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .tf-btn.correct-answer { background: var(--color-success); color: white; border-color: var(--color-success); }
        .tf-btn.wrong-answer { background: var(--color-error); color: white; border-color: var(--color-error); }

        .tf-explanation {
            display: none;
            font-size: var(--text-xs);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            margin-top: var(--space-2);
            line-height: var(--leading-relaxed);
        }
        .tf-explanation.show { display: block; }
        .tf-explanation.correct { background: #ECFDF5; color: #065F46; }
        .tf-explanation.wrong { background: #FEF2F2; color: #991B1B; }

        /* Matching / Association */
        .matching-container {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .matching-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .matching-term {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            background: var(--color-primary-50);
            border: 1px solid var(--color-primary-100);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-primary-dark);
        }

        .matching-arrow {
            font-size: var(--text-lg);
            color: var(--color-gray-400);
            flex-shrink: 0;
        }

        .matching-select {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            background: white;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            appearance: auto;
        }
        .matching-select:focus { border-color: var(--color-primary); }
        .matching-select.correct { border-color: var(--color-success); background: #ECFDF5; }
        .matching-select.wrong { border-color: var(--color-error); background: #FEF2F2; }

        /* Ordering */
        .ordering-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            counter-reset: order-counter;
        }

        .ordering-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            background: white;
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            cursor: grab;
            transition: all 0.2s;
            user-select: none;
        }
        .ordering-item:active { cursor: grabbing; }
        .ordering-item:hover { border-color: var(--color-primary-light); }
        .ordering-item.correct { border-color: var(--color-success); background: #F0FDF9; }
        .ordering-item.wrong { border-color: var(--color-error); background: #FEF8F8; }
        .ordering-item.dragging { opacity: 0.5; }

        .ordering-handle {
            color: var(--color-gray-400);
            font-size: var(--text-lg);
            cursor: grab;
            flex-shrink: 0;
        }

        .ordering-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--color-gray-100);
            color: var(--color-gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
            font-weight: 700;
            flex-shrink: 0;
        }
        .ordering-item.correct .ordering-number { background: var(--color-success); color: white; }
        .ordering-item.wrong .ordering-number { background: var(--color-error); color: white; }

        .ordering-text {
            flex: 1;
            font-size: var(--text-sm);
        }

        .ordering-arrows {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }

        .ordering-arrow-btn {
            background: var(--color-gray-100);
            border: none;
            border-radius: var(--radius-sm);
            width: 28px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            color: var(--color-gray-600);
            transition: all 0.15s;
        }
        .ordering-arrow-btn:hover { background: var(--color-primary); color: white; }

        /* Keyword short answer */
        .keyword-answer-input {
            width: 100%;
            min-height: 80px;
            padding: var(--space-4);
            border: 2px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            line-height: var(--leading-relaxed);
            resize: vertical;
            transition: border-color 0.2s;
            outline: none;
        }
        .keyword-answer-input:focus { border-color: var(--color-primary); }

        .keyword-feedback {
            display: none;
            margin-top: var(--space-4);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
        }
        .keyword-feedback.show { display: block; }

        .keyword-chip {
            display: inline-flex;
            padding: 2px var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            margin: 2px;
        }
        .keyword-chip.found { background: #ECFDF5; color: #065F46; }
        .keyword-chip.missing { background: #FEF2F2; color: #991B1B; }

        /* Exercise score banner */
        .exercise-score-banner {
            display: none;
            text-align: center;
            padding: var(--space-5);
            border-radius: var(--radius-xl);
            margin-top: var(--space-5);
        }
        .exercise-score-banner.show { display: block; }
        .exercise-score-banner.excellent { background: #ECFDF5; border: 2px solid var(--color-success); }
        .exercise-score-banner.average { background: #FFFBEB; border: 2px solid var(--color-warning); }
        .exercise-score-banner.poor { background: #FEF2F2; border: 2px solid var(--color-error); }

        .exercise-score-value {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            margin-bottom: var(--space-1);
        }
        .excellent .exercise-score-value { color: var(--color-success); }
        .average .exercise-score-value { color: var(--color-warning); }
        .poor .exercise-score-value { color: var(--color-error); }

        .exercise-score-label {
            font-size: var(--text-sm);

    // ===== STATE MANAGEMENT =====
    // Redirection legacy : l'ancienne formation Mobile Money (id '6')
    // est d\u00e9sormais fusionn\u00e9e dans E-commerce (id '2').
    let courseId = new URLSearchParams(window.location.search).get('id') || '1';
    if (courseId === '6') { courseId = '2'; }
    const course = COURSES_DATA[courseId];

    if (!course) { window.location.href = 'dashboard.html'; }

    // Progress
    let progressData = JSON.parse(localStorage.getItem('caplearning_progress') || '{}');

    // ===== RENDER SIDEBAR =====
    document.getElementById('course-title').textContent = course.name;

    function renderSidebar() {
        const container = document.getElementById('modules-list');
        let html = '';
        course.modules.forEach(mod => {
            html += `<div class="learn-module-group">
                <div class="learn-module-title">${mod.title}</div>`;
            mod.lessons.forEach((lesson, idx) => {
                const globalIdx = allLessons.findIndex(l => l.id === lesson.id);
                const isCompleted = progressData[courseId].completed.includes(lesson.id);
                const isActive = globalIdx === currentIndex;
                const typeMap = {
                    video: { cls: 'lesson-type-video', label: 'Vidéo' },
                    exercise: { cls: 'lesson-type-exercise', label: 'Exercice' },
                    quiz: { cls: 'lesson-type-quiz', label: 'Quiz' },
                    true_false: { cls: 'lesson-type-exercise', label: 'Vrai/Faux' },
                    fill_blank: { cls: 'lesson-type-exercise', label: 'Trous' },
                    matching: { cls: 'lesson-type-exercise', label: 'Assoc.' },
                    keyword_answer: { cls: 'lesson-type-exercise', label: 'Synthèse' },
                    ordering: { cls: 'lesson-type-exercise', label: 'Ordre' }
                };
                const tInfo = typeMap[lesson.type] || typeMap.exercise;
                const typeClass = tInfo.cls;
                const typeLabel = tInfo.label;

                    <span class="lesson-type ${typeClass}">${typeLabel}</span>
                </div>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        updateProgress();
    }

    function updateProgress() {
        const completed = progressData[courseId].completed.length;
        const total = allLessons.length;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = pct + '%';
    }

    // ===== RENDER LESSON =====
    function goToLesson(index) {
        currentIndex = index;
        const lesson = allLessons[index];

        // Sauvegarde du point de reprise (pour le dashboard "Reprendre")
        progressData[courseId].lastLessonId    = lesson.id;
        progressData[courseId].lastLessonTitle = lesson.title;
        progressData[courseId].lastLessonModule = lesson.module || '';
        progressData[courseId].lastLessonIndex = index;   // 0-indexed
        progressData[courseId].totalLessons    = allLessons.length;
        progressData[courseId].lastVisitedAt   = new Date().toISOString();
        saveProgress();

        // Update sidebar active state
        document.querySelectorAll('.learn-lesson').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`.learn-lesson[data-index="${index}"]`);
        if (activeEl) activeEl.classList.add('active');

        // Update player
        const playerArea = document.getElementById('player-area');
        if (lesson.type === 'video') {
            playerArea.style.display = 'flex';
            playerArea.style.background = course.gradient;
            document.getElementById('player-title').textContent = lesson.title;
        } else {
            playerArea.style.display = 'none';
        }

        // Update content
        document.getElementById('lesson-title').textContent = lesson.title;

        const typeBadge = document.getElementById('lesson-type-badge');
        const badgeMap = { video: '🎬 Vidéo', exercise: '✏️ Exercice pratique', quiz: '📝 Quiz', true_false: '✅ Vrai ou Faux', fill_blank: '📝 Texte à trous', matching: '🔗 Association', keyword_answer: '💬 Synthèse', ordering: '🔢 Remise en ordre' };
        typeBadge.textContent = badgeMap[lesson.type] || '✏️ Exercice';

        document.getElementById('lesson-duration').textContent = '⏱ ' + lesson.duration;

        // Render content based on type
        const body = document.getElementById('lesson-body');

        if (lesson.type === 'video') {
            body.innerHTML = lesson.content;
        } else if (lesson.type === 'exercise') {
            body.innerHTML = renderExercise(lesson);
        } else if (lesson.type === 'quiz') {
            body.innerHTML = renderQuiz(lesson);
            initQuiz(lesson);
        } else if (lesson.type === 'true_false') {
            tfAnswers = {};
            tfSubmitted = false;
            body.innerHTML = renderTrueFalse(lesson);
        } else if (lesson.type === 'fill_blank') {
            fillSubmitted = false;
            body.innerHTML = renderFillBlank(lesson);
        } else if (lesson.type === 'matching') {
            body.innerHTML = renderMatching(lesson);
        } else if (lesson.type === 'keyword_answer') {
            body.innerHTML = renderKeywordAnswer(lesson);
            setTimeout(() => initKeywordCounter(), 50);
        } else if (lesson.type === 'ordering') {
            body.innerHTML = renderOrdering(lesson);
        }

        // Update nav buttons
        document.getElementById('btn-prev').style.visibility = index > 0 ? 'visible' : 'hidden';
        document.getElementById('btn-next').style.visibility = index < allLessons.length - 1 ? 'visible' : 'hidden';

        // Update complete button
        const completeBtn = document.getElementById('btn-complete');
        const isCompleted = progressData[courseId].completed.includes(lesson.id);
        if (isCompleted) {
            completeBtn.textContent = 'Terminé ✓';
            completeBtn.classList.add('done');
        } else {
            const exerciseTypes = ['true_false','fill_blank','matching','keyword_answer','ordering'];
            completeBtn.textContent = lesson.type === 'quiz' ? 'Terminer le quiz' : exerciseTypes.includes(lesson.type) ? 'Valider l\'exercice' : 'Marquer comme terminé ✓';
            completeBtn.classList.remove('done');
        }

        // Close mobile sidebar
        document.getElementById('learn-sidebar').classList.remove('open');

        window.scrollTo(0, 0);
    }

    // ===== EXERCISE RENDERING =====
    function renderExercise(lesson) {
        const savedAnswer = localStorage.getItem('caplearning_exercise_' + lesson.id) || '';
        return `
            <div class="exercise-container">

    function saveExercise(lessonId) {
        const answer = document.getElementById('exercise-answer').value;
        localStorage.setItem('caplearning_exercise_' + lessonId, answer);
        if (answer.trim().length > 20) {

    // ===== ADAPTIVE MASTERY TRACKING =====
    let masteryData = JSON.parse(localStorage.getItem('caplearning_mastery_' + courseId) || '{}');

    function saveMastery() {
        localStorage.setItem('caplearning_mastery_' + courseId, JSON.stringify(masteryData));
    }

    function getMastery(concept) {
        if (!concept) return { score: 0, attempts: 0, level: 'beginner' };
        return masteryData[concept] || { score: 0, attempts: 0, level: 'beginner' };
    }

    function updateMastery(concept, correctCount, totalCount) {
        if (!concept) return;
        const prev = getMastery(concept);
        const sessionScore = Math.round((correctCount / totalCount) * 100);
        const newScore = prev.attempts === 0 ? sessionScore : Math.round(sessionScore * 0.6 + prev.score * 0.4);
        const level = newScore >= 80 ? 'advanced' : newScore >= 50 ? 'intermediate' : 'beginner';
        masteryData[concept] = { score: newScore, attempts: prev.attempts + 1, lastScore: sessionScore, level: level };
        saveMastery();
        return masteryData[concept];
    }

    function shouldShowHints(concept) {
        const m = getMastery(concept);
        return m.attempts > 0 && m.score < 50;
    }

    function retryExercise() {
        goToLesson(currentIndex);
    }

    // ===== TRUE/FALSE RENDERER =====
    let tfAnswers = {};
    let tfSubmitted = false;

    function renderTrueFalse(lesson) {
        const mastery = getMastery(lesson.concept);
        const showHints = shouldShowHints(lesson.concept);

        let html = '<div class="exercise-container">' +
            '<div class="exercise-header"><div class="exercise-icon exercise-icon-practice">✅</div>' +
            '<div><div class="exercise-title">' + lesson.title + '</div>' +
            '<div class="exercise-subtitle">Vrai ou Faux — ' + lesson.statements.length + ' affirmations</div></div></div>';

        if (mastery.attempts > 0) {
            html += '<div style="background:var(--color-primary-50); padding:var(--space-3) var(--space-4); border-radius:var(--radius-lg); margin-bottom:var(--space-4); font-size:var(--text-sm); color:var(--color-primary-dark);">\ud83d\udcca Votre ma\u00eetrise : <strong>' + mastery.score + '%</strong> \u2014 ' +
                (mastery.level === 'advanced' ? 'Excellent niveau !' : mastery.level === 'intermediate' ? 'En progression...' : 'Continuez \u00e0 pratiquer') + '</div>';
        }

        html += '<div class="exercise-instructions">' + lesson.intro + '</div><div id="tf-statements">';

        lesson.statements.forEach(function(s, i) {
            html += '<div class="tf-question" id="tf-q-' + i + '"><div style="flex:1;">' +
                '<div class="tf-statement">' + s.text + '</div>' +
                '<div class="tf-explanation" id="tf-exp-' + i + '"></div></div>' +
                '<div class="tf-buttons">' +
                '<button class="tf-btn" data-qi="' + i + '" data-val="true" onclick="selectTF(' + i + ', true)">Vrai</button>' +
                '<button class="tf-btn" data-qi="' + i + '" data-val="false" onclick="selectTF(' + i + ', false)">Faux</button>' +
                '</div></div>';
        });

        html += '</div><div style="text-align:center; margin-top:var(--space-5);">' +
            '<button class="btn btn-primary btn-lg" id="tf-submit" onclick="submitTrueFalse()">V\u00e9rifier mes r\u00e9ponses</button></div>' +
            '<div class="exercise-score-banner" id="tf-score-banner">' +
            '<div class="exercise-score-value" id="tf-score-value"></div>' +
            '<div class="exercise-score-label" id="tf-score-label"></div></div></div>';
        return html;
    }

    function selectTF(qi, val) {
        if (tfSubmitted) return;
        tfAnswers[qi] = val;
        document.querySelectorAll('.tf-btn[data-qi="' + qi + '"]').forEach(function(btn) { btn.classList.remove('selected'); });
        document.querySelector('.tf-btn[data-qi="' + qi + '"][data-val="' + val + '"]').classList.add('selected');
    }

    function submitTrueFalse() {
        var lesson = allLessons[currentIndex];
        if (!lesson || lesson.type !== 'true_false') return;

        var total = lesson.statements.length;
        var answered = Object.keys(tfAnswers).length;
        if (answered < total) { alert('R\u00e9pondez \u00e0 toutes les affirmations (' + answered + '/' + total + ')'); return; }

        tfSubmitted = true;
        var correct = 0;

        lesson.statements.forEach(function(s, i) {
            var userAnswer = tfAnswers[i];
            var isCorrect = userAnswer === s.answer;
            if (isCorrect) correct++;

            var qEl = document.getElementById('tf-q-' + i);
            qEl.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

            document.querySelectorAll('.tf-btn[data-qi="' + i + '"]').forEach(function(btn) {
                var btnVal = btn.dataset.val === 'true';
                if (btnVal === s.answer) btn.classList.add('correct-answer');
                else if (btnVal === userAnswer && !isCorrect) btn.classList.add('wrong-answer');
                btn.style.pointerEvents = 'none';
            });

            var expEl = document.getElementById('tf-exp-' + i);
            expEl.textContent = (isCorrect ? '\u2713 ' : '\u2717 ') + s.explanation;
            expEl.className = 'tf-explanation show ' + (isCorrect ? 'correct' : 'wrong');
        });

        var pct = Math.round((correct / total) * 100);
        var banner = document.getElementById('tf-score-banner');
        var scoreClass = pct >= 80 ? 'excellent' : pct >= 50 ? 'average' : 'poor';
        banner.className = 'exercise-score-banner show ' + scoreClass;
        document.getElementById('tf-score-value').textContent = pct + '%';
        document.getElementById('tf-score-label').textContent =
            pct >= 80 ? 'Bravo ! ' + correct + '/' + total + ' bonnes r\u00e9ponses' :
            pct >= 50 ? correct + '/' + total + ' \u2014 Relisez les explications des erreurs' :
            correct + '/' + total + ' \u2014 Revoyez la le\u00e7on pr\u00e9c\u00e9dente puis r\u00e9essayez';

        document.getElementById('tf-submit').textContent = '\ud83d\udd04 R\u00e9essayer';
        document.getElementById('tf-submit').onclick = retryExercise;

        updateMastery(lesson.concept, correct, total);
        if (pct >= 50) markCompleted(lesson.id);
    }

    // ===== FILL-IN-THE-BLANK RENDERER =====
    let fillSubmitted = false;

    function renderFillBlank(lesson) {
        var mastery = getMastery(lesson.concept);
        var showHints = shouldShowHints(lesson.concept);

        var html = '<div class="exercise-container">' +
            '<div class="exercise-header"><div class="exercise-icon exercise-icon-practice">\ud83d\udcdd</div>' +
            '<div><div class="exercise-title">' + lesson.title + '</div>' +
            '<div class="exercise-subtitle">Texte \u00e0 trous \u2014 Compl\u00e9tez les phrases</div></div></div>';

        if (mastery.attempts > 0) {
            html += '<div style="background:var(--color-primary-50); padding:var(--space-3) var(--space-4); border-radius:var(--radius-lg); margin-bottom:var(--space-4); font-size:var(--text-sm); color:var(--color-primary-dark);">\ud83d\udcca Votre ma\u00eetrise : <strong>' + mastery.score + '%</strong></div>';
        }

        html += '<div class="exercise-instructions">' + lesson.intro + '</div><div id="fill-sentences">';

        lesson.sentences.forEach(function(s, si) {
            var sentenceHtml = s.text.replace(/\{(\d+)\}/g, function(match, num) {
                return '<input type="text" class="fill-blank-input" id="fill-' + si + '-' + num + '" data-si="' + si + '" data-blank="' + num + '" placeholder="..." autocomplete="off">' +
                    '<span class="fill-blank-correction" id="fill-corr-' + si + '-' + num + '"></span>';
            });
            html += '<div class="fill-blank-sentence" id="fill-sentence-' + si + '">' + sentenceHtml + '</div>';
        });

        if (showHints && lesson.hints && lesson.hints.length > 0) {
            html += '<div style="background:#FFFBEB; border:1px solid var(--color-warning); padding:var(--space-3) var(--space-4); border-radius:var(--radius-lg); margin-top:var(--space-3); font-size:var(--text-sm);">' +
                '\ud83d\udca1 <strong>Indices :</strong><ul style="margin:var(--space-2) 0 0 var(--space-4);">';
            lesson.hints.forEach(function(h) { html += '<li>' + h + '</li>'; });
            html += '</ul></div>';
        }

        html += '</div><div style="text-align:center; margin-top:var(--space-5);">' +
            '<button class="btn btn-primary btn-lg" id="fill-submit" onclick="submitFillBlank()">V\u00e9rifier mes r\u00e9ponses</button></div>' +
            '<div class="exercise-score-banner" id="fill-score-banner">' +
            '<div class="exercise-score-value" id="fill-score-value"></div>' +
            '<div class="exercise-score-label" id="fill-score-label"></div></div></div>';
        return html;
    }

    function submitFillBlank() {
        var lesson = allLessons[currentIndex];
        if (!lesson || lesson.type !== 'fill_blank') return;

        fillSubmitted = true;
        var correct = 0, total = 0;

        lesson.sentences.forEach(function(s, si) {
            Object.keys(s.blanks).forEach(function(blankNum) {
                total++;
                var input = document.getElementById('fill-' + si + '-' + blankNum);
                var corrSpan = document.getElementById('fill-corr-' + si + '-' + blankNum);
                var userVal = input.value.trim();
                var acceptedAnswers = s.blanks[blankNum];

                var isCorrect = acceptedAnswers.some(function(a) {
                    return a.toLowerCase() === userVal.toLowerCase();
                });

                if (isCorrect) {
                    correct++;
                    input.classList.add('correct');
                } else {
                    input.classList.add('wrong');
                    corrSpan.textContent = '\u2192 ' + acceptedAnswers[0];
                    corrSpan.classList.add('show');
                }
                input.disabled = true;
            });
        });

        var pct = Math.round((correct / total) * 100);
        var banner = document.getElementById('fill-score-banner');
        var scoreClass = pct >= 80 ? 'excellent' : pct >= 50 ? 'average' : 'poor';
        banner.className = 'exercise-score-banner show ' + scoreClass;
        document.getElementById('fill-score-value').textContent = pct + '%';
        document.getElementById('fill-score-label').textContent =
            pct >= 80 ? 'Parfait ! ' + correct + '/' + total + ' r\u00e9ponses correctes' :
            pct >= 50 ? correct + '/' + total + ' \u2014 Les r\u00e9ponses correctes sont affich\u00e9es' :
            correct + '/' + total + ' \u2014 Relisez la le\u00e7on et r\u00e9essayez';

        document.getElementById('fill-submit').textContent = '\ud83d\udd04 R\u00e9essayer';
        document.getElementById('fill-submit').onclick = retryExercise;

        updateMastery(lesson.concept, correct, total);
        if (pct >= 50) markCompleted(lesson.id);
    }

    // ===== MATCHING RENDERER =====

        var html = '<div class="exercise-container">' +
            '<div class="exercise-header"><div class="exercise-icon exercise-icon-practice">\ud83d\udd17</div>' +

        }

        html += '<div class="exercise-instructions">' + lesson.intro + '</div><div class="matching-container" id="matching-pairs">';

        lesson.pairs.forEach(function(pair, pi) {

            '<div class="exercise-score-value" id="match-score-value"></div>' +
            '<div class="exercise-score-label" id="match-score-label"></div></div></div>';
        return html;
    }

    function submitMatching() {
        var lesson = allLessons[currentIndex];
        if (!lesson || lesson.type !== 'matching') return;

        var correct = 0, total = lesson.pairs.length, allAnswered = true;

        lesson.pairs.forEach(function(pair, pi) {
            var select = document.getElementById('match-select-' + pi);
            if (select.value === '') { allAnswered = false; return; }

            var userAnswer = parseInt(select.value);
            var isCorrect = userAnswer === pair.correct;
            if (isCorrect) correct++;

            select.classList.add(isCorrect ? 'correct' : 'wrong');
            select.disabled = true;

            if (!isCorrect) {
                var row = document.getElementById('match-row-' + pi);
                var correction = document.createElement('div');
                correction.style.cssText = 'font-size:12px; color:var(--color-success); font-weight:600; margin-top:4px; width:100%;';
                correction.textContent = '\u2192 ' + pair.definitions[pair.correct];
                row.appendChild(correction);
            }
        });

        if (!allAnswered) { alert('Veuillez associer chaque concept \u00e0 une d\u00e9finition.'); return; }

        var pct = Math.round((correct / total) * 100);
        var banner = document.getElementById('match-score-banner');
        var scoreClass = pct >= 80 ? 'excellent' : pct >= 50 ? 'average' : 'poor';
        banner.className = 'exercise-score-banner show ' + scoreClass;
        document.getElementById('match-score-value').textContent = pct + '%';
        document.getElementById('match-score-label').textContent =
            pct >= 80 ? 'Excellent ! ' + correct + '/' + total + ' associations correctes' :
            pct >= 50 ? correct + '/' + total + ' \u2014 Les bonnes r\u00e9ponses sont affich\u00e9es' :
            correct + '/' + total + ' \u2014 Revoyez les d\u00e9finitions dans le cours';

        document.getElementById('match-submit').textContent = '\ud83d\udd04 R\u00e9essayer';
        document.getElementById('match-submit').onclick = retryExercise;

        updateMastery(lesson.concept, correct, total);
        if (pct >= 50) markCompleted(lesson.id);
    }

    // ===== KEYWORD ANSWER RENDERER =====
    function renderKeywordAnswer(lesson) {
        var mastery = getMastery(lesson.concept);
        var showHints = shouldShowHints(lesson.concept);

        var html = '<div class="exercise-container">' +
            '<div class="exercise-header"><div class="exercise-icon exercise-icon-practice">\ud83d\udcac</div>' +
            '<div><div class="exercise-title">' + lesson.title + '</div>' +

        if (mastery.attempts > 0) {

        }

        html += '<div class="exercise-instructions">' + lesson.intro + '</div>' +

                '\ud83d\udca1 <strong>Concepts attendus :</strong> pensez \u00e0 mentionner ' + hintWords.join(', ') + '...</div>';

            '<div style="text-align:center; margin-top:var(--space-4);">' +
            '<button class="btn btn-primary btn-lg" id="kw-submit" onclick="submitKeywordAnswer()">Analyser ma r\u00e9ponse</button></div>' +

    function initKeywordCounter() {
        var textarea = document.getElementById('kw-answer');
        if (!textarea) return;
        function updateCount() {
            var words = textarea.value.trim().split(/\s+/).filter(function(w) { return w.length > 0; }).length;
            document.getElementById('kw-counter').textContent = words + ' mot' + (words !== 1 ? 's' : '');
        }
        textarea.addEventListener('input', updateCount);
        updateCount();
    }

    function submitKeywordAnswer() {
        var lesson = allLessons[currentIndex];
        if (!lesson || lesson.type !== 'keyword_answer') return;

        var answer = document.getElementById('kw-answer').value.trim();
        if (answer.split(/\s+/).length < 5) {
            alert('\u00c9crivez au moins quelques phrases pour analyser votre r\u00e9ponse.');
            return;
        }

        localStorage.setItem('caplearning_kw_' + lesson.id, answer);

        var answerLower = answer.toLowerCase();
        var totalScore = 0, maxScore = 0;
        var foundKeywords = [], missingKeywords = [];

        lesson.keywords.forEach(function(kw) {
            maxScore += kw.weight;
            var allTerms = [kw.word].concat(kw.aliases || []);
            var found = allTerms.some(function(term) { return answerLower.includes(term.toLowerCase()); });
            if (found) { totalScore += kw.weight; foundKeywords.push(kw.label); }
            else { missingKeywords.push(kw.label); }
        });

        var pct = Math.round((totalScore / maxScore) * 100);

        var chipsHtml = '<div style="font-size:var(--text-sm); margin-bottom:var(--space-2);">Concepts d\u00e9tect\u00e9s :</div>';
        foundKeywords.forEach(function(k) { chipsHtml += '<span class="keyword-chip found">\u2713 ' + k + '</span>'; });
        missingKeywords.forEach(function(k) { chipsHtml += '<span class="keyword-chip missing">\u2717 ' + k + '</span>'; });

        var feedbackEl = document.getElementById('kw-feedback');
        var textEl = document.getElementById('kw-feedback-text');
        var chipsEl = document.getElementById('kw-chips');

        if (pct >= 75) {
            feedbackEl.style.background = '#ECFDF5'; feedbackEl.style.border = '1px solid var(--color-success)';
            textEl.textContent = lesson.feedback.excellent; textEl.style.color = '#065F46';
        } else if (pct >= 40) {
            feedbackEl.style.background = '#FFFBEB'; feedbackEl.style.border = '1px solid var(--color-warning)';
            textEl.textContent = lesson.feedback.good; textEl.style.color = '#92400E';
        } else {
            feedbackEl.style.background = '#FEF2F2'; feedbackEl.style.border = '1px solid var(--color-error)';
            textEl.textContent = lesson.feedback.needsWork; textEl.style.color = '#991B1B';
        }
        chipsEl.innerHTML = chipsHtml;
        feedbackEl.classList.add('show');

        var banner = document.getElementById('kw-score-banner');
        var scoreClass = pct >= 75 ? 'excellent' : pct >= 40 ? 'average' : 'poor';
        banner.className = 'exercise-score-banner show ' + scoreClass;
        document.getElementById('kw-score-value').textContent = pct + '%';
        document.getElementById('kw-score-label').textContent = totalScore + '/' + maxScore + ' points \u2014 ' + foundKeywords.length + ' concept' + (foundKeywords.length > 1 ? 's' : '') + ' trouv\u00e9' + (foundKeywords.length > 1 ? 's' : '');

        document.getElementById('kw-submit').textContent = 'R\u00e9analyser ma r\u00e9ponse';

        updateMastery(lesson.concept, totalScore, maxScore);
        if (pct >= 40) markCompleted(lesson.id);
    }

    // ===== ORDERING RENDERER =====
    function renderOrdering(lesson) {
        var mastery = getMastery(lesson.concept);
        var items = lesson.items.slice();
        // Shuffle items
        for (var i = items.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var temp = items[i]; items[i] = items[j]; items[j] = temp;
        }
        window._orderItems = items;

        var html = '<div class="exercise-container">' +
            '<div class="exercise-header"><div class="exercise-icon exercise-icon-practice">\ud83d\udd22</div>' +
            '<div><div class="exercise-title">' + lesson.title + '</div>' +
            '<div class="exercise-subtitle">Remise en ordre \u2014 Classez les \u00e9l\u00e9ments</div></div></div>';

        if (mastery.attempts > 0) {
            html += '<div style="background:var(--color-primary-50); padding:var(--space-3) var(--space-4); border-radius:var(--radius-lg); margin-bottom:var(--space-4); font-size:var(--text-sm); color:var(--color-primary-dark);">\ud83d\udcca Votre ma\u00eetrise : <strong>' + mastery.score + '%</strong></div>';
        }

        html += '<div class="exercise-instructions">' + lesson.intro + '</div><div class="ordering-list" id="ordering-list">';

        items.forEach(function(item, idx) {
            html += '<div class="ordering-item" data-correct="' + item.order + '" id="order-item-' + idx + '">' +
                '<div class="ordering-number">' + (idx + 1) + '</div>' +
                '<div class="ordering-text">' + item.text + '</div>' +
                '<div class="ordering-arrows">' +
                '<button class="ordering-arrow-btn" onclick="moveOrderItem(' + idx + ', -1)">\u25b2</button>' +
                '<button class="ordering-arrow-btn" onclick="moveOrderItem(' + idx + ', 1)">\u25bc</button>' +
                '</div></div>';
        });

        html += '</div><div style="text-align:center; margin-top:var(--space-5);">' +
            '<button class="btn btn-primary btn-lg" id="order-submit" onclick="submitOrdering()">V\u00e9rifier l\'ordre</button></div>' +
            '<div class="exercise-score-banner" id="order-score-banner">' +
            '<div class="exercise-score-value" id="order-score-value"></div>' +
            '<div class="exercise-score-label" id="order-score-label"></div></div></div>';
        return html;
    }

    function moveOrderItem(idx, direction) {
        var list = document.getElementById('ordering-list');
        var items = Array.from(list.children);
        var newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= items.length) return;

        // Swap in DOM
        if (direction === -1) {
            list.insertBefore(items[idx], items[newIdx]);
        } else {
            list.insertBefore(items[newIdx], items[idx]);
        }

        // Re-number and re-bind
        Array.from(list.children).forEach(function(item, i) {
            item.querySelector('.ordering-number').textContent = i + 1;
            item.id = 'order-item-' + i;
            var btns = item.querySelectorAll('.ordering-arrow-btn');
            btns[0].onclick = function() { moveOrderItem(i, -1); };
            btns[1].onclick = function() { moveOrderItem(i, 1); };
        });
    }

    function submitOrdering() {
        var lesson = allLessons[currentIndex];
        if (!lesson || lesson.type !== 'ordering') return;

        var list = document.getElementById('ordering-list');
        var items = Array.from(list.children);
        var correct = 0;

        items.forEach(function(item, i) {
            var correctOrder = parseInt(item.dataset.correct);
            var isCorrect = correctOrder === (i + 1);
            if (isCorrect) correct++;
            item.classList.add(isCorrect ? 'correct' : 'wrong');
            item.querySelector('.ordering-number').textContent = (i + 1);
            // Disable arrows
            item.querySelectorAll('.ordering-arrow-btn').forEach(function(btn) { btn.disabled = true; btn.style.opacity = '0.3'; });
        });

        var total = items.length;
        var pct = Math.round((correct / total) * 100);
        var banner = document.getElementById('order-score-banner');
        var scoreClass = pct >= 80 ? 'excellent' : pct >= 50 ? 'average' : 'poor';
        banner.className = 'exercise-score-banner show ' + scoreClass;
        document.getElementById('order-score-value').textContent = pct + '%';
        document.getElementById('order-score-label').textContent =
            pct >= 80 ? 'Bravo ! ' + correct + '/' + total + ' en bonne position' :
            pct >= 50 ? correct + '/' + total + ' \u2014 Pas mal, r\u00e9visez l\'ordre' :
            correct + '/' + total + ' \u2014 Revoyez le cours et r\u00e9essayez';

        document.getElementById('order-submit').textContent = '\ud83d\udd04 R\u00e9essayer';
        document.getElementById('order-submit').onclick = retryExercise;

        updateMastery(lesson.concept, correct, total);
        if (pct >= 50) markCompleted(lesson.id);
    }

    // ===== QUIZ RENDERING =====
    let quizAnswers = {};
    let quizSubmitted = false;

    function renderQuiz(lesson) {
        quizAnswers = {};
        quizSubmitted = false;
        let html = `
            <div class="exercise-container">
                <div class="exercise-header">
                    <div class="exercise-icon exercise-icon-quiz">📝</div>
                    <div>
                        <div class="exercise-title">${lesson.title}</div>
                        <div class="exercise-subtitle">${lesson.questions.length} questions — Testez vos connaissances</div>
                    </div>
                </div>
                <div id="quiz-questions">`;

        lesson.questions.forEach((q, i) => {
            html += `<div class="quiz-question" data-qi="${i}">
                <div class="quiz-question-text">
                    <span class="quiz-question-number">${i + 1}.</span>
                    <span>${q.q}</span>
                </div>
                <div class="quiz-options">`;
            q.options.forEach((opt, oi) => {
                html += `<div class="quiz-option" data-qi="${i}" data-oi="${oi}" onclick="selectOption(${i}, ${oi})">
                    <div class="quiz-option-radio"></div>
                    <span>${opt}</span>
                </div>`;
            });
            html += `</div>
                <div class="quiz-explanation" id="explanation-${i}"></div>
            </div>`;
        });

        html += `</div>
                <div style="text-align: center; margin-top: var(--space-6);">
                    <button class="btn btn-primary btn-lg" id="quiz-submit-btn" onclick="submitQuiz()">Valider mes réponses</button>
                </div>
                <div class="quiz-results" id="quiz-results">
                    <div class="quiz-score" id="quiz-score-value"></div>
                    <div class="quiz-results-text" id="quiz-results-text"></div>
                    <button class="btn btn-outline" onclick="retryQuiz()">Recommencer le quiz</button>
                </div>
            </div>`;
        return html;
    }

    function selectOption(qi, oi) {
        if (quizSubmitted) return;
        quizAnswers[qi] = oi;
        // Update UI
        document.querySelectorAll(`.quiz-option[data-qi="${qi}"]`).forEach(el => el.classList.remove('selected'));
        document.querySelector(`.quiz-option[data-qi="${qi}"][data-oi="${oi}"]`).classList.add('selected');
    }

    function initQuiz(lesson) {
        // Check if already scored
        const prevScore = progressData[courseId].quizScores[lesson.id];
        if (prevScore !== undefined) {
            // Show previous score but allow retry
        }
    }

    function submitQuiz() {
        const lesson = allLessons[currentIndex];
        if (lesson.type !== 'quiz') return;

        const totalQ = lesson.questions.length;
        const answeredQ = Object.keys(quizAnswers).length;

        if (answeredQ < totalQ) {
            alert(`Veuillez répondre à toutes les questions (${answeredQ}/${totalQ})`);
            return;
        }

        quizSubmitted = true;
        let correct = 0;

        lesson.questions.forEach((q, i) => {
            const userAnswer = quizAnswers[i];
            const isCorrect = userAnswer === q.correct;
            if (isCorrect) correct++;

            // Highlight correct/wrong
            document.querySelectorAll(`.quiz-option[data-qi="${i}"]`).forEach(el => {
                const oi = parseInt(el.dataset.oi);
                if (oi === q.correct) el.classList.add('correct');
                else if (oi === userAnswer && !isCorrect) el.classList.add('wrong');
            });

            // Show explanation
            const expEl = document.getElementById('explanation-' + i);
            expEl.textContent = q.explanation;
            expEl.className = 'quiz-explanation show ' + (isCorrect ? 'correct' : 'wrong');
        });

        // Show score
        const pct = Math.round((correct / totalQ) * 100);
        const scoreEl = document.getElementById('quiz-score-value');
        scoreEl.textContent = pct + '%';
        scoreEl.className = 'quiz-score ' + (pct >= 80 ? 'excellent' : pct >= 50 ? 'average' : 'poor');

        const resultsText = document.getElementById('quiz-results-text');
        if (pct >= 80) resultsText.textContent = `Excellent ! ${correct}/${totalQ} bonnes réponses.`;
        else if (pct >= 50) resultsText.textContent = `Pas mal ! ${correct}/${totalQ} bonnes réponses. Révisez les erreurs.`;
        else resultsText.textContent = `${correct}/${totalQ} bonnes réponses. Relisez le cours et réessayez.`;

        document.getElementById('quiz-results').classList.add('show');
        document.getElementById('quiz-submit-btn').style.display = 'none';

        // Save score
        progressData[courseId].quizScores[lesson.id] = pct;
        markCompleted(lesson.id);
    }

    function retryQuiz() {
        quizAnswers = {};
        quizSubmitted = false;
        const lesson = allLessons[currentIndex];
        document.getElementById('lesson-body').innerHTML = renderQuiz(lesson);
    }

    // ===== NAVIGATION =====
    function markCompleted(lessonId) {
        if (!progressData[courseId].completed.includes(lessonId)) {
            progressData[courseId].completed.push(lessonId);
            saveProgress();
            renderSidebar();
            // Update complete button without re-rendering the whole lesson
            var completeBtn = document.getElementById('btn-complete');
            completeBtn.textContent = 'Terminé ✓';
            completeBtn.classList.add('done');
            updateProgress();
        }
    }

    document.getElementById('btn-complete').addEventListener('click', () => {
        const lesson = allLessons[currentIndex];
        if (lesson.type === 'quiz' && !quizSubmitted) { submitQuiz(); return; }
        if (lesson.type === 'true_false' && !tfSubmitted) { submitTrueFalse(); return; }
        if (lesson.type === 'fill_blank' && !fillSubmitted) { submitFillBlank(); return; }
        if (lesson.type === 'matching') { submitMatching(); return; }
        if (lesson.type === 'keyword_answer') { submitKeywordAnswer(); return; }
        if (lesson.type === 'ordering') { submitOrdering(); return; }
        markCompleted(lesson.id);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentIndex > 0) goToLesson(currentIndex - 1);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        if (currentIndex < allLessons.length - 1) goToLesson(currentIndex + 1);
    });

    // Mobile sidebar toggle
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
        document.getElementById('learn-sidebar').classList.toggle('open');
    });

    // ===== INIT =====
    renderSidebar();

    // Point de reprise : dernière leçon visitée, sinon première non complétée, sinon 0
    (function initialLesson() {
        const qs = new URLSearchParams(window.location.search);
        if (qs.get('lesson')) {
            const forcedIdx = allLessons.findIndex(l => l.id === qs.get('lesson'));
            if (forcedIdx >= 0) { goToLesson(forcedIdx); return; }
        }

        const saved = progressData[courseId] || {};
        if (typeof saved.lastLessonIndex === 'number' && saved.lastLessonIndex < allLessons.length) {
            goToLesson(saved.lastLessonIndex);
            return;
        }
        if (saved.lastLessonId) {
            const idx = allLessons.findIndex(l => l.id === saved.lastLessonId);
            if (idx >= 0) { goToLesson(idx); return; }
        }
        // Fallback : première leçon non complétée
        const completedSet = new Set((saved.completed || []));
        const firstUncompleted = allLessons.findIndex(l => !completedSet.has(l.id));
        goToLesson(firstUncompleted >= 0 ? firstUncompleted : 0);
    })();
    </script>
    <script src="../js/gamification.js"></script>
    <script>
    // ===== GAMIFICATION INTEGRATION =====
    (function() {
        Gamification.injectStyles();

        // Update streak on page load
        var streakResult = Gamification.updateStreak();
        if (streakResult.isNew && streakResult.streak.current > 1) {
            setTimeout(function() {
                Gamification.showXPToast(
                    Gamification.XP_REWARDS.streak_bonus,
                    'Série de ' + streakResult.streak.current + ' jours !'
                );
                Gamification.addXP(Gamification.XP_REWARDS.streak_bonus, 'streak_bonus');
            }, 1500);
        }

        // Render gamification sidebar widget
        function refreshGamifWidget() {
            Gamification.renderSidebarWidget(document.getElementById('gamif-sidebar-widget'));
        }
        refreshGamifWidget();

        // Override markCompleted to integrate XP + badges + celebrations
        var _origMarkCompleted = markCompleted;
        markCompleted = function(lessonId) {
            var wasAlreadyCompleted = progressData[courseId].completed.includes(lessonId);
            _origMarkCompleted(lessonId);

            if (wasAlreadyCompleted) return;

            // Determine XP reward
            var lesson = allLessons.find(function(l) { return l.id === lessonId; });
            if (!lesson) return;

            var xpAmount = 0;
            var reason = '';

            if (lesson.type === 'video') {
                xpAmount = Gamification.XP_REWARDS.video_complete;
                reason = 'Vidéo terminée';
            } else if (lesson.type === 'quiz') {
                var score = progressData[courseId].quizScores[lessonId] || 0;
                xpAmount = score === 100 ? Gamification.XP_REWARDS.quiz_perfect : Gamification.XP_REWARDS.quiz_pass;
                reason = score === 100 ? 'Quiz parfait ! 🎯' : 'Quiz réussi';
            } else {
                // Exercise types (true_false, fill_blank, matching, keyword_answer, ordering, exercise)
                var conceptMastery = lesson.concept ? (JSON.parse(localStorage.getItem('caplearning_mastery_' + courseId) || '{}')[lesson.concept]) : null;
                var score = conceptMastery ? conceptMastery.lastScore : 50;
                xpAmount = score >= 95 ? Gamification.XP_REWARDS.exercise_perfect : Gamification.XP_REWARDS.exercise_pass;
                reason = score >= 95 ? 'Exercice parfait ! ✨' : 'Exercice terminé';

                // Comeback badge check
                if (conceptMastery && conceptMastery.attempts > 1 && conceptMastery.lastScore >= 50 && conceptMastery.score < 50) {
                    Gamification.checkBadges({ type: 'retry_success' });
                }
            }

            // Add XP
            if (xpAmount > 0) {
                var result = Gamification.addXP(xpAmount, reason);
                Gamification.showXPToast(xpAmount, reason);

                // Level up celebration
                if (result.leveledUp) {
                    setTimeout(function() {
                        Gamification.showLevelUp(result.newLevel);
                    }, 800);
                }
            }

            // Check for module completion bonus
            var currentModule = null;
            course.modules.forEach(function(mod) {
                mod.lessons.forEach(function(l) {
                    if (l.id === lessonId) currentModule = mod;
                });
            });
            if (currentModule) {
                var allModuleDone = currentModule.lessons.every(function(l) {
                    return progressData[courseId].completed.includes(l.id);
                });
                if (allModuleDone) {
                    setTimeout(function() {
                        var modResult = Gamification.addXP(Gamification.XP_REWARDS.module_complete, 'module_complete');
                        Gamification.showXPToast(Gamification.XP_REWARDS.module_complete, 'Module terminé ! 🎉');
                        if (modResult.leveledUp) {
                            setTimeout(function() { Gamification.showLevelUp(modResult.newLevel); }, 800);
                        }
                    }, 3000);
                }
            }

            // Check for course completion
            var allCourseDone = allLessons.every(function(l) {
                return progressData[courseId].completed.includes(l.id);
            });
            if (allCourseDone) {
                setTimeout(function() {
                    var courseResult = Gamification.addXP(Gamification.XP_REWARDS.course_complete, 'course_complete');
                    Gamification.showXPToast(Gamification.XP_REWARDS.course_complete, 'Formation terminée ! 🏆');
                    Gamification.showConfetti();
                    if (courseResult.leveledUp) {
                        setTimeout(function() { Gamification.showLevelUp(courseResult.newLevel); }, 1500);
                    }
                }, 4000);
            }

            // Check badges
            var quizScore = lesson.type === 'quiz' ? (progressData[courseId].quizScores[lessonId] || 0) : null;
            var awardedBadges = Gamification.checkBadges({
                type: lesson.type === 'quiz' ? 'quiz' : 'exercise',
                score: quizScore
            });

            awardedBadges.forEach(function(badge, i) {
                setTimeout(function() {
                    Gamification.showBadgeUnlock(badge);
                }, 1500 + (i * 2000));
            });

            // Refresh widget
            refreshGamifWidget();
        };
    })();
    </script>
