<!--
  Cap Learning — Theme toggle (light / dark)
  Copie-colle ce bloc là où tu veux le bouton dans tes pages HTML.
  Dépend de : js/theme.js (à charger avant ce HTML).
  Le CSS (.cap-theme-toggle) est dans css/tokens.css.
-->
<button
    type="button"
    class="cap-theme-toggle"
    aria-label="Basculer le thème clair / sombre"
    onclick="CapTheme && CapTheme.toggle()"
    title="Basculer le thème clair / sombre"
>
    <!-- Icône soleil (visible en thème clair) -->
    <svg class="cap-theme-toggle-icon cap-theme-toggle-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2"/>
        <path d="M12 20v2"/>
        <path d="m4.93 4.93 1.41 1.41"/>
        <path d="m17.66 17.66 1.41 1.41"/>
        <path d="M2 12h2"/>
        <path d="M20 12h2"/>
        <path d="m6.34 17.66-1.41 1.41"/>
        <path d="m19.07 4.93-1.41 1.41"/>
    </svg>
    <!-- Icône lune (visible en thème sombre) -->
    <svg class="cap-theme-toggle-icon cap-theme-toggle-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
</button>
